services:
  # FastAPI image-processing API backed by Supabase PostgreSQL.
  - type: web
    name: sed-punjab-resizer-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: U2NET_HOME
        value: /opt/render/project/src/backend/model_cache
      - key: PRELOAD_REMBG_MODEL
        value: "1"
      - key: PROCESS_MAX_DIM
        value: "960"
      - key: REMBG_MODEL
        value: u2net
      - key: SUBJECT_MARGIN_PX
        value: "3"
      - key: PYTHON_VERSION
        value: 3.11.11

  # React frontend. This replaces the paused Vercel deployment.
  - type: web
    name: sed-punjab-resizer-frontend
    runtime: static
    buildCommand: "cd frontend && npm ci && npm run build"
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://sed-punjab-resizer-backend.onrender.com
